<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For medlemmer - CG Klubben</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="for-medlemmer.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-grid">
        <div class="header-logo-slot left">
          <div class="header-logo-frame logo-felles-bg">
            <img
              class="header-logo"
              src="assets/fellesforbundet-logo.png"
              alt="Fellesforbundet logo"
            />
          </div>
        </div>
        <div class="header-title">
          <h1>CG KLUBBEN</h1>
          <p>Gjør din plikt - Krev din rett</p>
        </div>
        <div class="header-logo-slot right">
          <div class="header-logo-frame">
            <img class="header-logo" src="assets/cg-logo.png" alt="CG logo" />
          </div>
        </div>
      </div>
    </header>

    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="index.html">HOVEDSIDE</a>
      <a href="https://www.agderfagforening.no/hytteleie/" target="_blank" rel="noopener noreferrer"
        >HYTTER TJØMSVÅGEN</a
      >
      <a href="#">OM KLUBBEN</a>
      <a href="#">RETTIGHETER OG FORSIKRING</a>
      <a class="members-link" href="for-medlemmer.html">FOR MEDLEMMER</a>
    </nav>

    <main class="content members-content">
      <section id="auth-gateway" class="auth-grid auth-single" aria-label="Innlogging">
        <article class="welcome-card auth-card">
          <h3>Logg inn</h3>
          <form id="login-form" class="auth-form" autocomplete="off" novalidate>
            <label for="login-username">Bruker</label>
            <input
              id="login-username"
              name="login_username_code"
              type="text"
              autocomplete="off"
              spellcheck="false"
              required
            />

            <label for="login-password">Passord</label>
            <input
              id="login-password"
              name="login_password_code"
              type="password"
              autocomplete="new-password"
              spellcheck="false"
              required
            />

            <button type="submit" class="action-btn">Logg inn</button>
          </form>
        </article>
      </section>

      <section id="member-app" class="member-app" hidden>
        <div class="wall-layout">
          <article class="welcome-card wall-card">
            <h3>Veggen</h3>
            <p class="member-user" id="member-user-label"></p>

            <form id="wall-form" class="wall-form" autocomplete="off" novalidate>
              <label for="wall-title">Tittel</label>
              <input id="wall-title" type="text" maxlength="120" required />

              <label for="wall-message">Melding</label>
              <textarea id="wall-message" rows="4" maxlength="4000" required></textarea>

              <div id="wall-target-row" class="wall-target-row" hidden>
                <label for="wall-target-member">Send varsel til medlem</label>
                <select id="wall-target-member">
                  <option value="">Ingen målrettet varsel</option>
                </select>
              </div>

              <label id="wall-frontpage-row" class="check-row" for="wall-frontpage" hidden>
                <input id="wall-frontpage" type="checkbox" />
                Forside
              </label>

              <button type="submit" class="action-btn">Publiser på veggen</button>
            </form>

            <ul id="wall-list" class="wall-list">
              <li class="feed-status">Laster veggen...</li>
            </ul>

            <button id="logout-button" type="button" class="secondary-btn">Logg ut</button>
          </article>

          <aside class="welcome-card online-card">
            <h3>Online</h3>
            <ul id="online-list" class="online-list">
              <li class="feed-status">Ingen online akkurat nå.</li>
            </ul>
          </aside>
        </div>
      </section>

      <p id="auth-status" class="status-msg" role="status" aria-live="polite"></p>
    </main>

    <a id="admin-fab" class="admin-fab" href="styret-login.html" hidden>#</a>
  </body>
</html>
