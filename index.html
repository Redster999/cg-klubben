<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CG Klubben</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-grid">
        <div class="header-logo-slot left">
          <div class="header-logo-frame logo-felles-bg">
            <img
              class="header-logo"
              src="assets/fellesforbundet-logo.png"
              alt="Fellesforbundet logo"
            />
          </div>
        </div>
        <div class="header-title">
          <h1>CG KLUBBEN</h1>
          <p>Gjør din plikt – Krev din rett</p>
        </div>
        <div class="header-logo-slot right">
          <div class="header-logo-frame">
            <img class="header-logo" src="assets/cg-logo.png" alt="CG logo" />
          </div>
        </div>
      </div>
    </header>

    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="#">HOVEDSIDE</a>
      <a href="https://www.agderfagforening.no/hytteleie/">HYTTER TJØMSVÅGEN</a>
      <a href="#">OM KLUBBEN</a>
      <a href="#">FORSIKRINGER</a>
      <a href="#">JOBB MEDIA</a>
    </nav>

    <main class="content">
      <h2>Velkommen til CG klubben</h2>
      <section class="welcome-grid" aria-label="Informasjonsfelt">
        <article class="welcome-card">
          <h3>Rettigheter</h3>
          <p>Her blir lovverk listet opp senere.</p>
        </article>
        <article class="welcome-card">
          <h3>Aktuelt</h3>
          <p>Her kommer aktuelle saker og oppdateringer.</p>
        </article>
        <article class="welcome-card">
          <h3>Kursvirksomhet</h3>
          <p>Her kommer informasjon om kurs og opplaering.</p>
        </article>
      </section>
    </main>
  </body>
</html>
