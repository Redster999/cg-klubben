name: Update Fellesforbundet Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "27 */6 * * *"

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update feed files
        run: python scripts/update_fellesforbundet_feeds.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No feed updates"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/events.json
          git commit -m "Oppdater Fellesforbundet-feeds"
          git push
